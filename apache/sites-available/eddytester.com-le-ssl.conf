<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName eddytester.com
    ServerAlias www.eddytester.com
    DocumentRoot /var/www/eddytester.com

    <Directory /var/www/eddytester.com>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    DirectoryIndex page101918416.html

    ErrorLog /eddytester.com_ssl_error.log
    CustomLog /eddytester.com_ssl_access.log combined

    RewriteEngine On

    # Proxy для API
    ProxyPass /check-key http://localhost:3456/check-key
    ProxyPassReverse /check-key http://localhost:3456/check-key

    ProxyPass /create-payment http://localhost:3457/create-payment
    ProxyPassReverse /create-payment http://localhost:3457/create-payment

    ProxyPass /bugs http://localhost:3000/bugs
    ProxyPassReverse /bugs http://localhost:3000/bugs

    # Progress API
    ProxyPass /get-progress http://localhost:3000/get-progress
    ProxyPassReverse /get-progress http://localhost:3000/get-progress

    ProxyPass /save-progress http://localhost:3000/save-progress
    ProxyPassReverse /save-progress http://localhost:3000/save-progress

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/eddytester.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/eddytester.com/privkey.pem
</VirtualHost>
</IfModule>
