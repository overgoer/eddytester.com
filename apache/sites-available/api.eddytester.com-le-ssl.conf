<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName api.eddytester.com

    ErrorLog /api.eddytester.com_error.log
    CustomLog /api.eddytester.com_access.log combined

    ProxyPreserveHost On
    ProxyPass / http://localhost:3001/
    ProxyPassReverse / http://localhost:3001/

SSLCertificateFile /etc/letsencrypt/live/api.eddytester.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/api.eddytester.com/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
