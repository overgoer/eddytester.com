<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName practicum.eddytester.com

    ErrorLog /practicum.eddytester.com_error.log
    CustomLog /practicum.eddytester.com_access.log combined

    ProxyPreserveHost On
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

SSLCertificateFile /etc/letsencrypt/live/practicum.eddytester.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/practicum.eddytester.com/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
