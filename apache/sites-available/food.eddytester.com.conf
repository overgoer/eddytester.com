<VirtualHost *:80>
    ServerName food.eddytester.com

    ErrorLog /food.eddytester.com_error.log
    CustomLog /food.eddytester.com_access.log combined

    ProxyPreserveHost On
    ProxyPass /v1/ http://localhost:3005/v1/
    ProxyPassReverse /v1/ http://localhost:3005/v1/
    ProxyPass /v2/ http://localhost:3006/v2/
    ProxyPassReverse /v2/ http://localhost:3006/v2/
    ProxyPass / http://localhost:3005/
    ProxyPassReverse / http://localhost:3005/
</VirtualHost>
