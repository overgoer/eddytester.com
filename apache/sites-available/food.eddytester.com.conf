<VirtualHost *:80>
    ServerName food.eddytester.com

    ErrorLog /food.eddytester.com_error.log
    CustomLog /food.eddytester.com_access.log combined

    # Редирект на HTTPS (Cloudflare Flexible SSL)
    RewriteEngine On
    RewriteCond %{SERVER_NAME} =food.eddytester.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
