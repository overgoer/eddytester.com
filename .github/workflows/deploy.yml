name: Deploy to Timeweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (git pull)
        run: |
          SSH_KEY="${{ secrets.SERVER_SSH_KEY }}"
          HOST="${{ secrets.SERVER_HOST }}"
          PORT="${{ secrets.SERVER_PORT }}"
          USER="${{ secrets.SERVER_USER }}"

          KEY_FILE=$(mktemp)
          echo "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          trap "rm -f $KEY_FILE" EXIT

          ssh -p "$PORT" -i "$KEY_FILE" -o StrictHostKeyChecking=no "$USER@$HOST" \
            "cd /var/www/eddytester.com && \
             git pull origin main && \
             cp server/yookassa.js /var/www/v0-test-api/v0-test-api/src/routes/yookassa.js && \
             cp -r apache/sites-available/*.conf /etc/apache2/sites-available/ && \
             for conf in apache/sites-available/*.conf; do \
               site=\$(basename \"\$conf\"); \
               a2ensite \"\$site\" 2>/dev/null || true; \
             done && \
             apachectl -k graceful && \
             pm2 restart payment-yookassa || true"
